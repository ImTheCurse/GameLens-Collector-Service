doc: "End an existing run and trigger classification"
tags:
  - Run
parameters:
  - name: body
    in: body
    required: true
    schema:
      type: object
      required:
        - run_id
        - ended_at
      properties:
        run_id:
          type: string
          description: Run identifier to close
          example: "4c48c210-fa5b-493e-b870-aa447becc0a6"
        ended_at:
          type: string
          format: date-time
          description: ISO-8601 UTC timestamp for when the run ended
          example: "2026-03-02T11:00:00Z"
      example:
        run_id: "4c48c210-fa5b-493e-b870-aa447becc0a6"
        ended_at: "2026-03-02T11:00:00Z"
responses:
  200:
    description: Run ended successfully and classification result returned
    schema:
      type: object
      properties:
        message:
          type: string
          example: "Run ended successfully"
        run_id:
          type: string
          example: "4c48c210-fa5b-493e-b870-aa447becc0a6"
        classifications:
          type: object
          description: Raw classifier service response payload
          properties:
            predictions:
              type: array
              items:
                type: object
                properties:
                  start:
                    type: integer
                    example: 12
                  end:
                    type: integer
                    example: 14
                  label:
                    type: string
                    example: "dialog"
    examples:
      application/json:
        classifications:
          predictions:
            - end: 14
              label: "dialog"
              start: 12
            - end: 25
              label: "choice"
              start: 15
            - end: 77
              label: "dialog"
              start: 75
            - end: 84
              label: "choice"
              start: 78
            - end: 149
              label: "choice"
              start: 137
        message: "Run ended successfully"
        run_id: "4c48c210-fa5b-493e-b870-aa447becc0a6"
  400:
    description: Missing required parameters, invalid timestamp format, or server-side validation/database error
  500:
    description: Classification service request failed after ending the run
